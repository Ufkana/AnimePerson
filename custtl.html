<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать свой Тир-Лист — WifeHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="teto.png">
    <style>
        .add-form {
            background: rgba(15,10,50,0.9);
            padding: 2rem;
            border-radius: 20px;
            max-width: 600px;
            margin: 2rem auto;
            border: 2px solid #a78bfa;
        }
        .add-form input, .add-form button {
            width: 100%;
            padding: 1rem;
            margin: 0.8rem 0;
            background: rgba(30,20,80,0.8);
            border: 2px solid #a78bfa;
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        .add-form button {
            background: linear-gradient(90deg, #ff6ec7, #a78bfa);
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="v/WF.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<a href="intl.html" class="back-button neon-btn">← На главную</a>

<div class="wrapper">
    <h1>Создай свой Тир-Лист</h1>

    <div class="tier-container">
        <div class="tier-row"><div class="tier-label s">S</div><div class="tier-characters" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
        <div class="tier-row"><div class="tier-label a">A</div><div class="tier-characters" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
        <div class="tier-row"><div class="tier-label b">B</div><div class="tier-characters" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
        <div class="tier-row"><div class="tier-label c">C</div><div class="tier-characters" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
        <div class="tier-row"><div class="tier-label d">D</div><div class="tier-characters" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
    </div>
</div>

<!-- КНОПКА -->
<button class="add-btn" onclick="openModal()">+</button>

<!-- МОДАЛКА -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2>Добавить</h2>
        <input type="text" id="char-name" placeholder="Имя">
        <input type="url" id="char-url" placeholder="URL картинки">
        <button onclick="addCharacter()">Добавить</button>
        <button onclick="closeModal()">Отмена</button>
    </div>
</div>

<style>

.wrapper {
    max-width: 1100px;
    margin: 100px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 2.5rem;
    background: linear-gradient(90deg,#ff6ec7,#a78bfa,#7dd3fc);
    -webkit-background-clip: text;
    color: transparent;
}

/* ТИРЫ */
.tier-row {
    display: flex;
    margin: 10px 0;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(20,15,60,0.8);
}

.tier-label {
    width: 80px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:1.5rem;
}

.tier-label.s { background:#ff4d6d; }
.tier-label.a { background:#ff9e00; }
.tier-label.b { background:#ffd60a; }
.tier-label.c { background:#70e000; }
.tier-label.d { background:#4ea8de; }

.tier-characters {
    flex:1;
    display:flex;
    flex-wrap:wrap;
    padding:10px;
    gap:10px;
}

/* КАРТОЧКА */
.tier-item {
    width: 90px;
    background: rgba(30,20,80,0.9);
    border-radius:10px;
    overflow:hidden;
    text-align:center;
    position:relative;
    cursor:grab;
    transition:0.2s;
}

.tier-item:hover {
    transform: scale(1.05);
}

.tier-item img {
    width:100%;
    height:90px;
    object-fit:cover;
}

.tier-item span {
    display:block;
    font-size:0.8rem;
    padding:5px;
}

/* УДАЛИТЬ */
.remove-btn {
    position:absolute;
    top:3px;
    right:3px;
    width:18px;
    height:18px;
    border:none;
    border-radius:50%;
    background:#ff4d6d;
    color:white;
    font-size:12px;
    cursor:pointer;
}

/* КНОПКА + */
.add-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    font-size:2rem;
    background: linear-gradient(135deg,#ff6ec7,#a78bfa);
    color:white;
    cursor:pointer;
}

/* МОДАЛКА */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    align-items:center;
    justify-content:center;
}

.modal-content {
    
    background: rgba(15,10,50,0.95);
    padding:25px;
    border-radius:15px;
    width:300px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.modal-content input, .modal-content button {
    padding:10px;
    border-radius:8px;
    border:none;
}

</style>

<script>
let characters = JSON.parse(localStorage.getItem('tierList')) || [];

// открыть/закрыть модалку
function openModal(){
    document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

// сохранить в localStorage
function save(){
    localStorage.setItem('tierList', JSON.stringify(characters));
}

// добавить персонажа
function addCharacter(){
    const name = document.getElementById('char-name').value.trim();
    const url = document.getElementById('char-url').value.trim();

    if(!name || !url) return;

    const char = {
        id: Date.now(),
        name,
        img: url,
        tier: 's'
    };

    characters.push(char);
    save();
    render();

    closeModal();
}

// удалить
function removeCharacter(id){
    characters = characters.filter(c => c.id !== id);
    save();
    render();
}

function addFromDatabase(){
    const value = document.getElementById('char-search').value.trim().toLowerCase();

    if(!value) return;

    let found;

    // поиск по ID
    if(!isNaN(value)){
        found = allCharacters.find(c => c.id == value);
    } else {
        // поиск по имени
        found = allCharacters.find(c => c.name.toLowerCase().includes(value));
    }

    if(!found) return alert("Не найдено");

    const char = {
        id: Date.now(),
        name: found.name,
        img: found.img,
        tier: 's'
    };

    characters.push(char);
    save();
    render();
    closeModal();
}
// выбор тира
function chooseTier(id){
    const tier = prompt("Выбери тир: S A B C D");
    if(!tier) return;

    const t = tier.toLowerCase();

    if(!['s','a','b','c','d'].includes(t)) return alert("Ошибка");

    const char = characters.find(c => c.id === id);
    if(char){
        char.tier = t;
        save();
        render();
    }
}

// создание карточки
function createCard(char){
    const div = document.createElement('div');
    div.className = 'tier-item';

    div.innerHTML = `
        <button class="remove-btn">×</button>
        <img src="${char.img}" onerror="this.src='https://via.placeholder.com/100'">
        <span>${char.name}</span>
    `;

    div.onclick = () => chooseTier(char.id);
    div.querySelector('.remove-btn').onclick = (e) => {
        e.stopPropagation();
        removeCharacter(char.id);
    };

    return div;
}

// рендер
function render(){

    const map = {
        s: document.querySelectorAll('.tier-characters')[0],
        a: document.querySelectorAll('.tier-characters')[1],
        b: document.querySelectorAll('.tier-characters')[2],
        c: document.querySelectorAll('.tier-characters')[3],
        d: document.querySelectorAll('.tier-characters')[4],
    };

    // очистка
    Object.values(map).forEach(el => el.innerHTML = '');

    // заполнение
    characters.forEach(char => {
        const card = createCard(char);
        map[char.tier].appendChild(card);
    });
}

// запуск
render();

</script>

</body>
</html>
