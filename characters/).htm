<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Марин Китагава | Биография</title>
  <link rel="icon" href="marin.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="../v/mk.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>
<div class="effects-container"></div>
<div class="neon-flashes"></div>

<div class="overlay"></div>

<a href="../wuman.htm" class="back-button neon-btn">← Назад</a>


<script>
const menuToggle = document.querySelector('.menu-toggle');
const sidebar = document.querySelector('.sidebar');
const overlay = document.querySelector('.overlay');

function toggleMenu() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  menuToggle.classList.toggle('open');
}

if(menuToggle){
  menuToggle.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', toggleMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && sidebar.classList.contains('open')) {
      toggleMenu();
    }
  });
}
</script>

</body>
</html>
