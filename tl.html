<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f0a32;
    color:#fff;
    overflow-x:hidden;
}

/* Видео фон */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.bg-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,10,50,.72);
    z-index:-1;
}

/* ================== ГАМБУРГЕР ================== */
.menu-toggle{
    position:fixed;
    top:18px;
    left:18px;
    width:55px;
    height:55px;
    border:none;
    border-radius:14px;
    background:#8b5cf6;
    cursor:pointer;
    z-index:1200;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    box-shadow:0 10px 20px rgba(0,0,0,.35);
    transition:.25s;
}

.menu-toggle:hover{
    transform:scale(1.05);
}

.menu-toggle span{
    width:28px;
    height:3px;
    border-radius:50px;
    background:#fff;
    transition:.35s;
}

/* крестик */
.menu-toggle.open span:nth-child(1){
    transform:translateY(9px) rotate(45deg);
}

.menu-toggle.open span:nth-child(2){
    opacity:0;
    transform:scale(0);
}

.menu-toggle.open span:nth-child(3){
    transform:translateY(-9px) rotate(-45deg);
}

/* ================== МЕНЮ ================== */
.sidebar{
    position:fixed;
    top:0;
    left:-290px;
    width:270px;
    height:100%;
    background:#18123f;
    z-index:1100;
    transition:.35s ease;
    padding:90px 20px 20px;
    box-shadow:5px 0 20px rgba(0,0,0,.4);
}

.sidebar.open{
    left:0;
}

.sidebar h2{
    margin-bottom:20px;
    color:#d8b4fe;
    text-align:center;
}

.menu-list{
    list-style:none;
}

.menu-link{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    color:#fff;
    text-decoration:none;
    background:rgba(255,255,255,.03);
    transition:.25s;
}

.menu-link:hover{
    background:#8b5cf6;
    transform:translateX(5px);
}

/* затемнение */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1000;
}

.overlay.open{
    opacity:1;
    visibility:visible;
}

/* ================== ПОСТЫ ================== */
#posts{
    max-width:850px;
    margin:100px auto 70px;
    padding:15px;
}

.post{
    background:rgba(255,255,255,.05);
    border:1px solid #8b5cf6;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.post-header{
    display:flex;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.post-avatar{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #a78bfa;
}

.post-name{
    color:#ff8ed1;
    font-weight:bold;
}

.post-text{
    line-height:1.5;
    color:#eee;
    white-space:pre-wrap;
}

/* ================== КНОПКА + ================== */
.add-post-btn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    font-size:34px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
    z-index:999;
    box-shadow:0 10px 25px rgba(139,92,246,.5);
}

/* форма */
.post-form{
    position:fixed;
    right:20px;
    bottom:100px;
    width:320px;
    background:#1e1b4b;
    padding:18px;
    border-radius:16px;
    display:none;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.post-form.active{
    display:flex;
}

.post-form input,
.post-form textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    color:#fff;
}

.post-form button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="v/WF.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<!-- Гамбургер -->

<span></span>
<span></span>

</div>

<div class="post-text">
Пример поста. Тут будет твой Firebase контент.

<!-- форма -->

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyBQ_k66z6KoH8zAMrCECe1409t2ZQpcz-A",
  authDomain: "forumanimeperson.firebaseapp.com",
  projectId: "forumanimeperson",
  storageBucket: "forumanimeperson.firebasestorage.app",
  messagingSenderId: "894648589891",
  appId: "1:894648589891:web:b53ff13da5dd22722a3ef6",
  measurementId: "G-0BBEZB9DSL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================== ПЕРЕМЕННЫЕ ==================
const postsContainer = document.getElementById("posts");
const nameInput = document.getElementById("post-name");
const avatarInput = document.getElementById("post-avatar");
const textInput = document.getElementById("post-text");
const sendBtn = document.getElementById("post-send");
const addBtn = document.getElementById("add-post-btn");
const postForm = document.getElementById("post-form");

let currentUserName = localStorage.getItem("currentUserName") || "Аноним";

// ================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==================
function esc(str) {
  return str.replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[m]));
}

function shortText(t) {
  return t.length > 150 ? t.substring(0, 150) + "..." : t;
}

// ================== ЗАГРУЗКА ПОСТОВ В РЕАЛЬНОМ ВРЕМЕНИ ==================
function loadPosts() {
  db.collection("posts")
    .orderBy("timestamp", "desc")
    .onSnapshot((snapshot) => {
      postsContainer.innerHTML = "";

      snapshot.forEach((doc) => {
        const post = doc.data();
        const postId = doc.id;
        const isOwnPost = post.name === currentUserName;
        const longText = post.text.length > 150;

        let html = `
          <div class="post">
            <div class="post-header">
              <img class="post-avatar" src="${post.avatar || 'https://i.imgur.com/8Km9tLL.png'}" alt="avatar">
              <div>
                <div class="post-name">${esc(post.name)}</div>
                <small>${post.date}</small>
              </div>
            </div>
            <div class="post-text" id="text-${postId}">
              ${esc(longText ? shortText(post.text) : post.text)}
            </div>`;

        if (longText) {
          html += `<button class="read-more-btn" onclick="togglePost('${postId}')">Прочитать полностью</button>`;
        }

        if (isOwnPost) {
          html += `<button class="delete-btn" onclick="deletePost('${postId}')">Удалить</button>`;
        }

        html += `</div>`;
        postsContainer.innerHTML += html;
      });
    });
}

// ================== ОТПРАВКА ПОСТА ==================
sendBtn.addEventListener("click", async () => {
  const text = textInput.value.trim();
  if (!text) return;

  let name = nameInput.value.trim();
  if (!name) name = "Аноним";

  if (name !== "Аноним") {
    currentUserName = name;
    localStorage.setItem("currentUserName", currentUserName);
  }

  try {
    await db.collection("posts").add({
      name: name,
      avatar: avatarInput.value.trim(),
      text: text,
      date: new Date().toLocaleString('ru-RU'),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    textInput.value = "";
    avatarInput.value = "";
  } catch (e) {
    alert("Ошибка при отправке: " + e.message);
  }
});

// ================== УДАЛЕНИЕ ПОСТА ==================
window.deletePost = async function(postId) {
  if (confirm("Удалить этот пост навсегда?")) {
    try {
      await db.collection("posts").doc(postId).delete();
    } catch (e) {
      alert("Не удалось удалить пост");
    }
  }
};

// ================== РАЗВЕРНУТЬ/СВЕРНУТЬ ТЕКСТ ==================
window.togglePost = function(postId) {
  const textEl = document.getElementById(`text-${postId}`);
  // Здесь можно улучшить логику, но для простоты оставим базовую
  // (полная реализация требует хранения состояния)
  alert("Полный текст: нажми 'Прочитать полностью' ещё раз для скрытия (пока упрощённо)");
};

// ================== МЕНЮ ==================
const menuToggle = document.getElementById('menu-toggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function toggleMenu() {
  menuToggle.classList.toggle('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

menuToggle.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);

// ================== ФОРМА ==================
addBtn.addEventListener("click", () => {
  postForm.classList.toggle("active");
});

// ================== ЗАПУСК ==================
nameInput.value = currentUserName;
loadPosts();
</script>
