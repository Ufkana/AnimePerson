<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wife</title>

<link rel="icon" href="teto.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f0a32;
    color:#fff;
    overflow-x:hidden;
}

/* Видео фон */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.bg-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,10,50,.72);
    z-index:-1;
}

/* ================== ГАМБУРГЕР ================== */
.menu-toggle{
    position:fixed;
    top:18px;
    left:18px;
    width:55px;
    height:55px;
    border:none;
    border-radius:14px;
    background:#8b5cf6;
    cursor:pointer;
    z-index:1200;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    box-shadow:0 10px 20px rgba(0,0,0,.35);
    transition:.25s;
}

.menu-toggle:hover{
    transform:scale(1.05);
}

.menu-toggle span{
    width:28px;
    height:3px;
    border-radius:50px;
    background:#fff;
    transition:.35s;
}

/* крестик */
.menu-toggle.open span:nth-child(1){
    transform:translateY(9px) rotate(45deg);
}

.menu-toggle.open span:nth-child(2){
    opacity:0;
    transform:scale(0);
}

.menu-toggle.open span:nth-child(3){
    transform:translateY(-9px) rotate(-45deg);
}

/* ================== МЕНЮ ================== */
.sidebar{
    position:fixed;
    top:0;
    left:-290px;
    width:270px;
    height:100%;
    background:#18123f;
    z-index:1100;
    transition:.35s ease;
    padding:90px 20px 20px;
    box-shadow:5px 0 20px rgba(0,0,0,.4);
}

.sidebar.open{
    left:0;
}

.sidebar h2{
    margin-bottom:20px;
    color:#d8b4fe;
    text-align:center;
}

.menu-list{
    list-style:none;
    padding:0;
    margin:0;
}

.menu-link{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    color:#fff;
    text-decoration:none;
    background:rgba(255,255,255,.03);
    transition:.25s;
}

.menu-link:hover{
    background:#8b5cf6;
    transform:translateX(5px);
}

/* затемнение */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1000;
}

.overlay.open{
    opacity:1;
    visibility:visible;
}

/* ================== ПОСТЫ ================== */
#posts{
    max-width:850px;
    margin:100px auto 70px;
    padding:15px;
}

.post{
    background:rgba(255,255,255,.05);
    border:1px solid #8b5cf6;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.post-header{
    display:flex;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.post-avatar{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #a78bfa;
}

.post-name{
    color:#ff8ed1;
    font-weight:bold;
}

.post-text{
    line-height:1.5;
    color:#eee;
    white-space:pre-wrap;
}

.post-actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

.read-more-btn,
.delete-btn{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.2s ease;
}

.read-more-btn{
    background:#8b5cf6;
    color:#fff;
}

.read-more-btn:hover{
    background:#6d28d9;
}

.delete-btn{
    background:#ff4281;
    color:#fff;
}

.delete-btn:hover{
    background:#dc1f6f;
}

/* ================== КНОПКА + ================== */
.add-post-btn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    font-size:34px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
    z-index:999;
    box-shadow:0 10px 25px rgba(139,92,246,.5);
}

.add-post-btn:hover{
    transform:scale(1.05);
}

/* форма */
.post-form{
    position:fixed;
    right:20px;
    bottom:100px;
    width:320px;
    background:#1e1b4b;
    padding:18px;
    border-radius:16px;
    display:none;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.post-form.active{
    display:flex;
}

.post-form input,
.post-form textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    color:#fff;
}

.post-form button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
}
.post-text{
    line-height:1.5;
    color:#eee;
    white-space:pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="v/WF.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<!-- Гамбургер -->
<button class="menu-toggle" id="menu-toggle" type="button">
<span></span>
<span></span>
<span></span>
</button>

<!-- Меню -->
<nav class="sidebar" id="sidebar">
<h2>Категории</h2>

<ul class="menu-list">
<li><a href="wuman.htm" class="menu-link">Женские персонажи</a></li>
<li><a href="men.htm" class="menu-link">Мужские персонажи</a></li>
<li><a href="intl.html" class="menu-link">Тир-листы</a></li>
<li><a href="tl.html" class="menu-link">Форум</a></li>
</ul>
</nav>

<div class="overlay" id="overlay"></div>

<!-- Посты -->
<div id="posts">
<div class="post">
<div class="post-header">
<img src="https://i.imgur.com/8Km9tLL.png" class="post-avatar" alt="avatar">
<div>
<div class="post-name">Аноним</div>
<small>18.04.2026</small>
</div>
</div>

<div class="post-text">
Пример поста. Тут будет твой Firebase контент.
</div>
</div>
</div>

<!-- кнопка -->
<button class="add-post-btn" id="add-post-btn" type="button">+</button>

<!-- форма -->
<div class="post-form" id="post-form">
<input id="post-name" placeholder="Имя">
<input id="post-avatar" placeholder="URL аватара">
<textarea id="post-text" rows="5" placeholder="Сообщение"></textarea>
<button id="post-send" type="button">Отправить</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>


<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyByXyimz-RIC8Mo_MvoFhBnneBWA3mNaa8",
    authDomain: "animepersonrr.firebaseapp.com",
    projectId: "animepersonrr",
    storageBucket: "animepersonrr.firebasestorage.app",
    messagingSenderId: "1059856419318",
    appId: "1:1059856419318:web:b3fe69d4c33602abe85fd7",
    measurementId: "G-0S6D6F7HR8"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================== ПЕРЕМЕННЫЕ ==================
const postsContainer = document.getElementById("posts");
const nameInput = document.getElementById("post-name");
const avatarInput = document.getElementById("post-avatar");
const textInput = document.getElementById("post-text");
const sendBtn = document.getElementById("post-send");
const addBtn = document.getElementById("add-post-btn");
const postForm = document.getElementById("post-form");
const menuToggle = document.getElementById("menu-toggle");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

let currentUserName = localStorage.getItem("currentUserName") || "Аноним";
window.postTextMap = {};

// ================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==================
function esc(str) {
  return str.replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[m]));
}

function shortText(t) {
  return t.length > 150 ? t.substring(0, 150) + "..." : t;
}

// ================== ЗАГРУЗКА ПОСТОВ В РЕАЛЬНОМ ВРЕМЕНИ ==================
function loadPosts() {
  db.collection("posts")
    .orderBy("timestamp", "desc")
    .onSnapshot((snapshot) => {
      postsContainer.innerHTML = "";

      snapshot.forEach((doc) => {
        const post = doc.data();
        const postId = doc.id;
        const isOwnPost = post.name === currentUserName;
        const longText = post.text.length > 150;

        window.postTextMap[postId] = post.text;

        let html = `
          <div class="post">
            <div class="post-header">
              <img class="post-avatar" src="${post.avatar || 'https://i.imgur.com/8Km9tLL.png'}" alt="avatar">
              <div>
                <div class="post-name">${esc(post.name)}</div>
                <small>${esc(post.date)}</small>
              </div>
            </div>
            <div class="post-text" id="text-${postId}">
              ${esc(longText ? shortText(post.text) : post.text)}
            </div>
            <div class="post-actions">`;

        if (longText) {
          html += `<button class="read-more-btn" type="button" onclick="togglePost('${postId}', this)">Прочитать полностью</button>`;
        }

        if (isOwnPost) {
          html += `<button class="delete-btn" type="button" onclick="deletePost('${postId}')">Удалить</button>`;
        }

        html += `</div></div>`;
        postsContainer.innerHTML += html;
      });
    });
}

// ================== ОТПРАВКА ПОСТА ==================
sendBtn.addEventListener("click", async () => {
  const text = textInput.value.trim();
  if (!text) return;

  let name = nameInput.value.trim();
  if (!name) name = "Аноним";

  if (name !== "Аноним") {
    currentUserName = name;
    localStorage.setItem("currentUserName", currentUserName);
  }

  try {
    await db.collection("posts").add({
      name: name,
      avatar: avatarInput.value.trim(),
      text: text,
      date: new Date().toLocaleString('ru-RU'),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    textInput.value = "";
    avatarInput.value = "";
  } catch (e) {
    alert("Ошибка при отправке: " + e.message);
  }
});

// ================== УДАЛЕНИЕ ПОСТА ==================
window.deletePost = async function(postId) {
  if (!confirm("Удалить этот пост навсегда?")) return;
  try {
    await db.collection("posts").doc(postId).delete();
  } catch (e) {
    alert("Не удалось удалить пост");
  }
};

// ================== РАЗВЕРНУТЬ/СВЕРНУТЬ ТЕКСТ ==================
window.togglePost = function(postId, button) {
  const textEl = document.getElementById(`text-${postId}`);
  const fullText = window.postTextMap[postId] || "";
  const isExpanded = button.dataset.open === "1";

  if (isExpanded) {
    textEl.textContent = shortText(fullText);
    button.textContent = "Прочитать полностью";
    button.dataset.open = "0";
  } else {
    textEl.textContent = fullText;
    button.textContent = "Скрыть";
    button.dataset.open = "1";
  }
};

// ================== МЕНЮ ==================
function toggleMenu() {
  menuToggle.classList.toggle('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

menuToggle.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);

// ================== ФОРМА ==================
addBtn.addEventListener("click", () => {
  postForm.classList.toggle("active");
});

// ================== ЗАПУСК ==================
nameInput.value = currentUserName;
loadPosts();
</script>
</body>
</html>
