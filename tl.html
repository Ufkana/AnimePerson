<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wife</title>

<link rel="icon" href="teto.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f0a32;
    color:#fff;
    overflow-x:hidden;
}

/* Видео фон */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.bg-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,10,50,.72);
    z-index:-1;
}

/* ================== ГАМБУРГЕР ================== */
.menu-toggle{
    position:fixed;
    top:18px;
    left:18px;
    width:55px;
    height:55px;
    border:none;
    border-radius:14px;
    background:#8b5cf6;
    cursor:pointer;
    z-index:1200;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    box-shadow:0 10px 20px rgba(0,0,0,.35);
    transition:.25s;
}

.menu-toggle:hover{
    transform:scale(1.05);
}

.menu-toggle span{
    width:28px;
    height:3px;
    border-radius:50px;
    background:#fff;
    transition:.35s;
}

/* крестик */
.menu-toggle.open span:nth-child(1){
    transform:translateY(9px) rotate(45deg);
}

.menu-toggle.open span:nth-child(2){
    opacity:0;
    transform:scale(0);
}

.menu-toggle.open span:nth-child(3){
    transform:translateY(-9px) rotate(-45deg);
}

/* ================== МЕНЮ ================== */
.sidebar{
    position:fixed;
    top:0;
    left:-290px;
    width:270px;
    height:100%;
    background:#18123f;
    z-index:1100;
    transition:.35s ease;
    padding:90px 20px 20px;
    box-shadow:5px 0 20px rgba(0,0,0,.4);
}

.sidebar.open{
    left:0;
}

.sidebar h2{
    margin-bottom:20px;
    color:#d8b4fe;
    text-align:center;
}

.menu-list{
    list-style:none;
}

.menu-link{
    display:block;
    padding:14px;
    margin-bottom:10px;
    border-radius:12px;
    color:#fff;
    text-decoration:none;
    background:rgba(255,255,255,.03);
    transition:.25s;
}

.menu-link:hover{
    background:#8b5cf6;
    transform:translateX(5px);
}

/* затемнение */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1000;
}

.overlay.open{
    opacity:1;
    visibility:visible;
}

/* ================== ПОСТЫ ================== */
#posts{
    max-width:850px;
    margin:100px auto 70px;
    padding:15px;
}

.post{
    background:rgba(255,255,255,.05);
    border:1px solid #8b5cf6;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.post-header{
    display:flex;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.post-avatar{
    width:52px;
    height:52px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #a78bfa;
}

.post-name{
    color:#ff8ed1;
    font-weight:bold;
}

.post-text{
    line-height:1.5;
    color:#eee;
    white-space:pre-wrap;
}

/* ================== КНОПКА + ================== */
.add-post-btn{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    font-size:34px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
    z-index:999;
    box-shadow:0 10px 25px rgba(139,92,246,.5);
}

/* форма */
.post-form{
    position:fixed;
    right:20px;
    bottom:100px;
    width:320px;
    background:#1e1b4b;
    padding:18px;
    border-radius:16px;
    display:none;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.post-form.active{
    display:flex;
}

.post-form input,
.post-form textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    color:#fff;
}

.post-form button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:#fff;
    cursor:pointer;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="v/WF.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<!-- Гамбургер -->
<button class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</button>

<!-- Меню -->
<nav class="sidebar" id="sidebar">
<h2>Категории</h2>

<ul class="menu-list">
<li><a href="wuman.htm" class="menu-link">Женские персонажи</a></li>
<li><a href="men.htm" class="menu-link">Мужские персонажи</a></li>
<li><a href="intl.html" class="menu-link">Тир-листы</a></li>
<li><a href="tl.html" class="menu-link">Форум</a></li>
</ul>
</nav>

<div class="overlay" id="overlay"></div>

<!-- Посты -->
<div id="posts">
<div class="post">
<div class="post-header">
<img src="https://i.imgur.com/8Km9tLL.png" class="post-avatar">
<div>
<div class="post-name">Аноним</div>
<small>18.04.2026</small>
</div>
</div>

<div class="post-text">
Пример поста. Тут будет твой Firebase контент.
</div>
</div>
</div>

<!-- кнопка -->
<button class="add-post-btn" id="addBtn">+</button>

<!-- форма -->
<div class="post-form" id="postForm">
<input placeholder="Имя">
<input placeholder="URL аватара">
<textarea rows="5" placeholder="Сообщение"></textarea>
<button>Отправить</button>
</div>

<script>
const menuToggle = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuToggle.onclick = () => {
    menuToggle.classList.toggle("open");
    sidebar.classList.toggle("open");
    overlay.classList.toggle("open");
};

overlay.onclick = () => {
    menuToggle.classList.remove("open");
    sidebar.classList.remove("open");
    overlay.classList.remove("open");
};

/* форма */
const addBtn = document.getElementById("addBtn");
const postForm = document.getElementById("postForm");

addBtn.onclick = () => {
    postForm.classList.toggle("active");
};
</script>

</body>
</html>
