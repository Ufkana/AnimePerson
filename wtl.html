<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Женский Тир-Лист</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="v/WF.mp4" type="video/mp4"></video>
    <div class="bg-overlay"></div>
<style>
    /* Основные стили для документа */
    html, body { /* добавляем высоту для корректного отображения фона */
        min-height: 100%; /* гарантируем, что тело займет всю высоту окна */
        margin: 0; /* убираем отступы по умолчанию */
        padding: 0; /* убираем отступы по умолчанию */
    }


    .tier-page { /* контейнер всей страницы тир-листа */
        position: relative; /* для наложения на фон */
        z-index: 1001;  /* выше фона и гамбургера */
        min-height: calc(100vh - 40px); /* учитываем отступы сверху и снизу */
        display: flex; /* используем флексбокс для вертикального центрирования */
        flex-direction: column; /* размещаем элементы вертикально */
        justify-content: center; /* центрируем по вертикали */
        align-items: center; /* центрируем по горизонтали */
        padding: 40px 20px; /* отступы вокруг содержимого */
    }


    h2 { /* стиль заголовка */
        font-family: 'Orbitron', sans-serif; /* стильный шрифт для заголовков */
        font-size: 2.5rem; /* размер текста заголовка */
        background: linear-gradient(90deg, #ff6ec7, #a78bfa, #7dd3fc); /* градиентный текст */
        -webkit-background-clip: text; /* делает текст прозрачным с градиентом */
        background-clip: text; /* делаем это и для других браузеров */
        color: transparent; /* скрываем обычный цвет текста */
        text-align: center; /* выравниваем заголовок по центру */
        margin-bottom: 40px; /* отступ снизу от заголовка */
    }
    .back-button.neon6-btn { /* стиль кнопки возврата */
  position: fixed; /* фиксируем кнопку на экране */
  top: 20px; /* отступ сверху для видимости */
  left: 40px; /* сдвигаем правее гамбургера */
  z-index: 1002; /* выше гамбургера и сайдбара */
  padding: 12px 28px; /* увеличиваем размер кнопки */
  background: rgba(20, 15, 60, 0.7); /* полупрозрачный темный фон */
  border: 2px solid #a78bfa; /* светлая рамка для контраста */
  border-radius: 50px; /* более округлая форма */
  color: #e0e0ff; /* светлый текст */
  font-family: 'Orbitron', monospace; /* стильный моноширинный шрифт */
  font-size: 1.4rem; /* размер текста кнопки */
  font-weight: 500; /* средняя жирность для лучшей читаемости */
  text-decoration: none; /* убираем подчеркивание */
  text-shadow: 0 0 12px #a78bfa; /* легкое свечение текста */
  box-shadow: 0 0 20px rgba(167, 139, 250, 0.5); /* мягкое свечение вокруг кнопки */
  backdrop-filter: blur(10px); /* размываем фон за кнопкой */
  transition: all 0.3s ease; /* плавные переходы для эффектов */
}

.back-button.neon6-btn:hover { /* эффект при наведении на кнопку */
  background: rgba(40, 30, 90, 0.9); /* более темный фон */
  border-color: #ff6ec7; /* цвет рамки при наведении */
  box-shadow: 0 0 40px rgba(255, 110, 199, 0.6); /* усиленное свечение */
  transform: translateY(-3px); /* легкое поднятие кнопки */
}
</style>
    <a href="intl.html" class="back-button neon6-btn">←</a>

        <div class="tier-page">

    <div class="tier-header">
        <h2>Тир-лист Женских Персонажей</h2>
    </div>

    <div class="tier-container">
        <div class="tier-row s-tier">
            <div class="tier-label">S</div>
            <div class="tier-characters" id="s-tier-female"></div>
        </div>

        <div class="tier-row a-tier">
            <div class="tier-label">A</div>
            <div class="tier-characters" id="a-tier-female"></div>
        </div>

        <div class="tier-row b-tier">
            <div class="tier-label">B</div>
            <div class="tier-characters" id="b-tier-female"></div>
        </div>

        <div class="tier-row c-tier">
            <div class="tier-label">C</div>
            <div class="tier-characters" id="c-tier-female"></div>
        </div>

        <div class="tier-row d-tier">
            <div class="tier-label">D</div>
            <div class="tier-characters" id="d-tier-female"></div>
        </div>
    </div>

</div>

   <script>

// Список женских персонажей и их ранг.
const femaleCharacters = [
    // s-tier
    {name: "Рем", img: "https://i.postimg.cc/fyxGZzJf/image.png", tier: "s"},
    {name: "Марин Китагава", img: "https://i.postimg.cc/C52tscKb/izobrazenie.png", tier: "s"},
    // a-tier
    {name: "Кагуя Синомия", img: "https://i.postimg.cc/MpjyGnWz/image.png", tier: "a"},
    {name: "Арима Кана", img: "https://i.postimg.cc/NfZbJqf1/izobrazenie.png", tier: "a"},
    {name: "Алиса Кудзе", img: "https://i.postimg.cc/VLSdR5NK/izobrazenie.png", tier: "a"},
    {name: "Акане Курокавэ", img: "https://i.postimg.cc/wTF6s2jc/image.png", tier: "a"},
    // b-tier
    {name: "Микаса", img: "https://i.postimg.cc/VNwzmH3V/izobrazenie.png", tier: "b"},
    {name: "Мегумин", img: "https://i.postimg.cc/RZyNbmn7/image.png", tier: "b"},
    {name: "Сейбер", img: "https://i.postimg.cc/656R5MNt/izobrazenie.png", tier: "b"},
    // c-tier
    {name: "Ю Касимо", img: "https://i.postimg.cc/VsWsmXhh/izobrazenie.png", tier: "c"},
    // d-tier
    {name: "Аура Белла Фиора", img: "https://i.postimg.cc/HxJp25LK/izobrazenie.png", tier: "d"},
    {name: "Томо Айдзава", img: "https://i.postimg.cc/yYGDCVM5/izobrazenie.png", tier: "d"}
];
    
    

// Соответствие ранга id контейнера на странице.
const tierMap = {
    s: 's-tier-female',
    a: 'a-tier-female',
    b: 'b-tier-female',
    c: 'c-tier-female',
    d: 'd-tier-female'
};

// Создаем карточку персонажа на основе данных объекта.
function createCard(char){
    const div = document.createElement('div');
    div.className = 'tier-item';

    div.innerHTML = `
        <img src="${char.img}" onerror="this.src='https://via.placeholder.com/100'"> <!-- если картинка не загрузилась, показываем заглушку -->
        <span>${char.name}</span> <!-- имя персонажа -->
    `;

    return div;
}

// Отрисовываем всех персонажей на странице.
function render(){
    // очистка всех контейнеров перед новой отрисовкой
    Object.values(tierMap).forEach(id => {
        document.getElementById(id).innerHTML = '';
    });

    // добавляем карточку в нужный контейнер по рангу
    femaleCharacters.forEach(char => {
        const card = createCard(char);
        document.getElementById(tierMap[char.tier]).appendChild(card);
    });
}

render(); // запускаем функцию отрисовки при загрузке страницы

</script>
</body>
</html>
