<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wife</title>
  <link rel="icon" href="teto.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="v/WF.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>
<div class="wave-container">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<!-- категории-кнопка -->
<button class="menu-toggle" aria-label="Открыть меню">
  <span class="bar bar-top"></span>
  <span class="bar bar-mid"></span>
  <span class="bar bar-bot"></span>
</button>

<!-- категорияии -->
<nav class="sidebar">
  <div class="sidebar-header">
    <h2>Категории</h2>
  </div>
  <ul class="menu-list">
    <li><a href="tomboy.htm" class="menu-link tomboy">Томбои</a></li>
    <li><a href="wuman.htm"  class="menu-link women">Женщины</a></li>
    <li><a href="femboy.htm" class="menu-link femboy">Фембои</a></li>
    <li><a href="men.htm"    class="menu-link men">Мужчины</a></li>
  </ul>
</nav>

<!-- Затемнение при открытом меню -->
<div class="overlay"></div>

<!-- Поиск -->
<div class="search-container">
  <div class="search-wrapper">
    <input
      type="text"
      id="waifu-search"
      placeholder="Введите имя персонажа..."
      autocomplete="off"
    >
    <div class="search-icon">🔍</div>
  </div>
  <div class="suggestions" id="suggestions"></div>
</div>
<script>
  // меню 
const menuToggle = document.querySelector('.menu-toggle');
const sidebar = document.querySelector('.sidebar');
const overlay = document.querySelector('.overlay');

function toggleMenu() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  menuToggle.classList.toggle('open');
}

menuToggle.addEventListener('click', toggleMenu);
overlay.addEventListener('click', toggleMenu);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && sidebar.classList.contains('open')) toggleMenu();
});
// Поиск — категории
const categories = [
  { name: "Арима Кана", link: "characters/ak.htm", color: "#911E42" },
  { name: "Рем", link: "characters/rem.htm", color: "#80DAEB" },
  { name: "Марин Китагава", link: "characters/mk.htm", color: "#FFCF48" },
  { name: "Алиса Кудзе", link: "characters/am.htm", color: "#FFFAFA" },
  { name: "Мегумин", link: "characters/mg.htm", color: "#ae1d1d" },
  { name: "Кагуя Синомия", link: "characters/kg.htm", color: "#FF2400" },
  { name: "Аканэ Курокавэ", link: "characters/ka.htm", color: "#4b3dc8" },

  { name: "Артурия Пендрагон", link: "characters/sb.htm", color: "#FFB841" },
  { name: "Микаса Акерман", link: "characters/ma.htm", color: "#88ffaa" },
  { name: "Томо Айдзава", link: "characters/tomo.htm", color: "#ff69b4" },
  { name: "Аура Белла Фиора", link: "characters/Bel.htm", color: "#d32f2f" },
  { name: "Ю Касима", link: "characters/Yu.htm", color: "#00f7ff" },

  { name: "Феликс Аргайл", link: "characters/felix.html", color: "#c026d3" },
  { name: "Реви", link: "characters/revy.html", color: "#d32f2f" },

  { name: "Годжо Сатору", link: "characters/gojo.htm", color: "#00FFFF" },
];

const searchInput = document.getElementById('waifu-search');
const suggestionsBox = document.getElementById('suggestions');

// Ввод текста
searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  suggestionsBox.innerHTML = '';

  if (query.length < 1) {
    suggestionsBox.style.display = 'none';
    return;
  }

  const matches = categories.filter(cat =>
    cat.name.toLowerCase().includes(query)
  );

  if (matches.length === 0) {
    suggestionsBox.style.display = 'none';
    return;
  }

  matches.forEach(cat => {
    const item = document.createElement('div');
    item.classList.add('suggestion-item');
    item.innerHTML = `<span style="color: ${cat.color}">${cat.name}</span>`;
    item.addEventListener('click', () => {
      window.location.href = cat.link;
    });
    suggestionsBox.appendChild(item);
  });

  suggestionsBox.style.display = 'block';
});
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();

    const query = this.value.toLowerCase().trim();
    if (query === "mirzaxarsenwww") {
      window.location.href = "characters/).htm";
      return;
    }
    if (query === "fileroman2025") {
  window.location.href = "characters/).htm";
  return;
}
    const first = suggestionsBox.querySelector('.suggestion-item');
    if (first) {
      first.click();
    }
  }
});


// Закрытие подсказок
document.addEventListener('click', function(e) {
  if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
    suggestionsBox.style.display = 'none';
  }
});
</script>
</body>
</html>
