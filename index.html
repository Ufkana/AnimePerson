<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- Базовые метаданные документа -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AnimePerson</title>
  <!-- Иконка сайта -->
  <link rel="icon" href="teto.png">
  <!-- Подключение внешней таблицы стилей -->
  <link rel="stylesheet" href="style.css">
  <!-- Подключение шрифтов Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Основные стили для тела страницы */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0a32;
      color: white;
      overflow-x: hidden;
    }

    /* Фоновое видео */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Наложение на фоновое видео для затемнения */
    .bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15, 10, 50, 0.75);
      z-index: -1;
    }

    /* Кнопка гамбургер-меню с фиксированной позицией */
    .menu-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1010;
      width: 52px;
      height: 52px;
      background: rgba(139, 92, 246, 0.95);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    /* Полоски меню-гамбургера */
    .bar {
      width: 28px;
      height: 3.5px;
      background: white;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    /* Анимация трансформации полосок при открытии меню */
    .menu-toggle.open .bar-top {
      transform: translateY(9px) rotate(45deg);
    }
    .menu-toggle.open .bar-mid {
      opacity: 0;
    }
    .menu-toggle.open .bar-bot {
      transform: translateY(-9px) rotate(-45deg);
    }

    /* Боковая панель навигации */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100vh;
      background: #1a1540;
      transition: left 0.4s ease;
      z-index: 1000;
      padding: 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.6);
    }

    /* Состояние открытия sidebar */
    .sidebar.open {
      left: 0;
    }

    /* Заголовок в сайдбаре */
    .sidebar-header h2 {
      margin: 0 0 25px 0;
      color: #c4b5fd;
      text-align: center;
    }

    /* Список меню */
    .menu-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* Элементы списка меню */
    .menu-list li {
      margin-bottom: 8px;
    }

    /* Ссылки меню */
    .menu-link {
      display: block;
      padding: 14px 18px;
      color: #ddd;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.2s;
    }

    /* Эффект наведения на ссылку */
    .menu-link:hover {
      background: rgba(139, 92, 246, 0.3);
      color: white;
    }

    /* Затемняющий оверлей при открытии меню */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 900;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    /* Видимое состояние оверлея */
    .overlay.open {
      opacity: 1;
      visibility: visible;
    }

    /* Контейнер поиска */
    .search-container {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      z-index: 100;
    }

    /* Обертка для поиска */
    .search-wrapper {
      position: relative;
    }

    /* Поле ввода поиска */
    #waifu-search {
      width: 100%;
      padding: 16px 50px 16px 20px;
      border: none;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      outline: none;
      backdrop-filter: blur(5px);
    }

    /* Иконка поиска */
    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      pointer-events: none;
    }

    /* Контейнер подсказок поиска */
    .suggestions {
      margin-top: 8px;
      background: #1e1b4b;
      border-radius: 12px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Элемент подсказки */
    .suggestion-item {
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* Последний элемент подсказки без границы */
    .suggestion-item:last-child {
      border-bottom: none;
    }

    /* Эффект наведения на подсказку */
    .suggestion-item:hover {
      background: rgba(139, 92, 246, 0.4);
    }
  </style>
</head>
<body>

<!-- Фоновое видео -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="v/WF.mp4" type="video/mp4">
</video>
<!-- Оверлей для затемнения фонового видео -->
<div class="bg-overlay"></div>

<!-- Кнопка гамбургер-меню -->
<button class="menu-toggle" aria-label="Открыть меню" id="menu-toggle">
  <span class="bar bar-top"></span>
  <span class="bar bar-mid"></span>
  <span class="bar bar-bot"></span>
</button>

<!-- Боковая панель навигации -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Категории</h2>
  </div>
  <ul class="menu-list">
    <li><a href="wuman.htm" class="menu-link women">Женские Персонажи</a></li>
    <li><a href="men.htm" class="menu-link men">Мужские Персонажи</a></li>
    <li><a href="intl.html" class="menu-link tomboy">Тир-Листы</a></li>
  </ul>
</nav>

<!-- Затемняющий оверлей, активируется при открытии меню -->
<div class="overlay" id="overlay"></div>

<!-- Блок поиска с подсказками -->
<div class="search-container">
  <div class="search-wrapper">
    <!-- Поле ввода поиска персонажей -->
    <input
      type="text"
      id="waifu-search"
      placeholder="Введите имя персонажа..."
      autocomplete="off"
    >
    <!-- Иконка лупы поиска -->
    <div class="search-icon">🔍</div>
  </div>
  <!-- Контейнер для выпадающих подсказок поиска -->
  <div class="suggestions" id="suggestions"></div>
</div>

<script>
  // === УПРАВЛЕНИЕ МЕНЮ ===
  // Получение элементов DOM для управления меню
  const menuToggle = document.getElementById('menu-toggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  // Функция для переключения состояния меню
  function toggleMenu() {
    menuToggle.classList.toggle('open');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  }

  // Добавление слушателя события на кнопку гамбургер-меню
  menuToggle.addEventListener('click', toggleMenu);
  // Закрытие меню при клике на оверлей
  overlay.addEventListener('click', toggleMenu);

  // Закрытие меню при нажатии клавиши Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && sidebar.classList.contains('open')) {
      toggleMenu();
    }
  });

  // === ФУНКЦИОНАЛЬНОСТЬ ПОИСКА ===
  // Массив с данными о персонажах для поиска
  const categories = [
    { name: "Арима Кана", link: "characters/ak.htm", color: "#911E42" },
    { name: "Рем", link: "characters/rem.htm", color: "#80DAEB" },
    { name: "Марин Китагава", link: "characters/mk.htm", color: "#FFCF48" },
    { name: "Алиса Кудзе", link: "characters/am.htm", color: "#FFFAFA" },
    { name: "Мегумин", link: "characters/mg.htm", color: "#ae1d1d" },
    { name: "Кагуя Синомия", link: "characters/kg.htm", color: "#FF2400" },
    { name: "Аканэ Курокавэ", link: "characters/ka.htm", color: "#4b3dc8" },
    { name: "Артурия Пендрагон", link: "characters/sb.htm", color: "#FFB841" },
    { name: "Микаса Акерман", link: "characters/ma.htm", color: "#88ffaa" },
    { name: "Томо Айдзава", link: "characters/tomo.htm", color: "#ff69b4" },
    { name: "Аура Белла Фиора", link: "characters/Bel.htm", color: "#d32f2f" },
    { name: "Ю Касима", link: "characters/Yu.htm", color: "#00f7ff" },
    { name: "Феликс Аргайл", link: "characters/felix.html", color: "#c026d3" },
    { name: "Реви", link: "characters/revy.html", color: "#d32f2f" },
    { name: "Годжо Сатору", link: "characters/gojo.htm", color: "#00FFFF" },
    { name: "Камина", link: "characters/kamina.html", color: "#ff4500" },
    { name: "Лелуш Британский", link: "characters/lelouch.html", color: "#800080" },
    { name: "Саске Учиха", link: "characters/sasuke.html", color: "#000000" },
    { name: "Итачи Учиха", link: "characters/itachi.html", color: "#1a1a1a" },
    { name: "Лайт Ягами", link: "characters/light.html", color: "#ff8c00" },
    { name: "Килуа Золдик", link: "characters/killua.html", color: "#00bfff" },
    { name: "Айзен Сосукэ", link: "characters/aizen.html", color: "#2f4f4f" },
    { name: "Гатс", link: "characters/guts.html", color: "#696969" },
    { name: "Си Ян", link: "characters/siyan.html", color: "#ff6347" }
  ];

  // Получение элементов поиска
  const searchInput = document.getElementById('waifu-search');
  const suggestionsBox = document.getElementById('suggestions');

  // Слушатель события ввода в поле поиска
  searchInput.addEventListener('input', function() {
    // Получение и приведение к нижнему регистру введенного текста
    const query = this.value.toLowerCase().trim();
    // Очистка контейнера подсказок
    suggestionsBox.innerHTML = '';

    // Если введено менее 1 символа, скрыть подсказки
    if (query.length < 1) {
      suggestionsBox.style.display = 'none';
      return;
    }

    // Фильтрация массива персонажей по введенному запросу
    const matches = categories.filter(cat => 
      cat.name.toLowerCase().includes(query)
    );

    // Если нет совпадений, скрыть подсказки
    if (matches.length === 0) {
      suggestionsBox.style.display = 'none';
      return;
    }

    // Создание элементов подсказок для каждого совпадения
    matches.forEach(cat => {
      const item = document.createElement('div');
      item.classList.add('suggestion-item');
      // Установка имени персонажа с его цветом
      item.innerHTML = `<span style="color: ${cat.color}">${cat.name}</span>`;
      // Переход на страницу персонажа при клике на подсказку
      item.addEventListener('click', () => {
        window.location.href = cat.link;
      });
      // Добавление элемента в контейнер подсказок
      suggestionsBox.appendChild(item);
    });

    //显示контейнер подсказок
    suggestionsBox.style.display = 'block';
  });

  // Слушатель события нажатия клавиш в поле поиска
  searchInput.addEventListener('keydown', function(e) {
    // Проверка нажатия клавиши Enter
    if (e.key === 'Enter') {
      e.preventDefault();
      // Получение введенного запроса
      const query = this.value.toLowerCase().trim();

      // Проверка на специальные коды доступа
      if (query === "mirzaxarsenwww" || query === "fileroman2025") {
        window.location.href = "characters/).htm";
        return;
      }

      // Клик на первого найденного персонажа
      const first = suggestionsBox.querySelector('.suggestion-item');
      if (first) first.click();
    }
  });

  // Закрытие подсказок при клике вне области поиска
  document.addEventListener('click', function(e) {
    // Проверка, было ли нажатие вне поля поиска и контейнера подсказок
    if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.style.display = 'none';
    }
  });
</script>
</body>
</html>
